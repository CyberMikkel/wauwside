<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Min side</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      text-align: center;
      padding: 40px;
      margin: 0;
      transition: 0.3s;
    }

    nav a {
      margin: 0 10px;
      text-decoration: none;
      color: #333;
      font-weight: bold;
    }

    img {
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      margin-top: 10px;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      margin: 5px;
    }

    button:hover {
      background: #45a049;
    }

    input {
      padding: 8px;
      margin-top: 10px;
    }

    /* 🌙 Dark mode */
    .dark {
      background-color: #121212;
      color: white;
    }

    .dark nav a {
      color: white;
    }
  </style>
</head>

<body>

  <nav>
    <a href="#">Forside</a>
    <a href="#om">Om mig</a>
    <a href="#kontakt">Kontakt</a>
  </nav>

  <h1>Min hjemmeside 🚀</h1>

  <!-- 🌓 Dark mode -->
  <button onclick="toggleDarkMode()">🌙 Skift tema</button>

  <!-- 📝 Tekst ændring -->
  <p id="tekst">Hej 👋 det her er min hjemmeside wauww</p>
  <button onclick="skiftTekst()">Skift tekst</button>

  <!-- 🧮 Tæller -->
  <h2 id="counter">0</h2>
  <button onclick="add()">+1</button>

  <!-- 🎲 Terning -->
  <h2 id="dice">-</h2>
  <button onclick="roll()">🎲 Rul terning</button>

  <!-- ⌨️ Input live -->
  <br><br>
  <input type="text" oninput="updateText(this.value)" placeholder="Skriv noget...">
  <p id="output"></p>

  <!-- 🖼️ Billede -->
  <br>
  <img id="img" src="screenshot.png" alt="Mit billede">
  <br>
  <button onclick="changeImage()">Skift billede</button>

  <h2 id="om">Om mig</h2>
  <p>Jeg er ved at lære at lave hjemmesider med HTML, CSS og JavaScript.</p>

  <h2 id="kontakt">Kontakt</h2>
  <p>Email: dinmail@example.com</p>

  <footer>
    © 2026 Min hjemmeside
  </footer>

  <script>
    // 🌓 Dark mode
    function toggleDarkMode() {
      document.body.classList.toggle("dark");
    }

    // 📝 Skift tekst
    function skiftTekst() {
      document.getElementById("tekst").innerText =
        "Du klikkede på knappen! 🎉";
    }

    // 🧮 Tæller
    let count = 0;
    function add() {
      count++;
      document.getElementById("counter").innerText = count;
    }

    // 🎲 Terning
    function roll() {
      let result = Math.floor(Math.random() * 6) + 1;
      document.getElementById("dice").innerText = result;
    }

    // ⌨️ Live tekst
    function updateText(value) {
      document.getElementById("output").innerText = value;
    }

    // 🖼️ Skift billede
    function changeImage() {
      document.getElementById("img").src = "https://picsum.photos/300";
    }
  </script>

</body>
</html>
