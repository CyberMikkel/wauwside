<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Min side</title>

<style>
body {
font-family: Arial, sans-serif;

background-image: url("skærmbillede");
background-size: cover;
background-position: center;
background-repeat: no-repeat;

text-align: center;
padding: 40px;
margin: 0;
transition: 1s;

color: white; /* vigtigt hvis baggrunden er mørk */
}

nav {
margin-bottom: 20px;
}

nav a {
margin: 0 10px;
text-decoration: none;
color: #FFFFFF;
font-weight: bold;
}

h1 {
color: #FFFFFF;
}

img {
width: 300px;
border-radius: 12px;
box-shadow: 0 6px 15px rgba(0,0,0,0.2);
margin-top: 10px;
}

button {
padding: 10px 18px;
border: none;
background-color: #150082;
color: white;
border-radius: 8px;
cursor: pointer;
margin: 5px;
font-weight: bold;
transition: 0.2s;
}

button:hover {
transform: scale(1.05);
background-color: #800082;
}

input {
padding: 8px;
border-radius: 6px;
border: 1px solid #FFFFFF;
margin-top: 10px;
}

footer {
margin-top: 40px;
color: #666;
}

/* 🌙 Dark mode */
.dark {
background: #121212;
color: white;
}

.dark nav a {
color: white;
}

.dark button {
background: linear-gradient(135deg, #555, #888);
}

.dark img {
box-shadow: 0 6px 15px rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<nav>
<a href="#">Forside</a>
<a href="#om">Om mig</a>
<a href="#kontakt">Kontakt</a>
</nav>

<h1>Min hjemmeside</h1>

<!-- 🌙 Dark mode -->
<button onclick="toggleDarkMode()">Skift tema </button>

<!-- 📝 Tekst -->
<p id="tekst">Hej det her er min hjemmeside wauww</p>

<button onclick="skiftTekst()">Sejeknap</button>

<!-- 🧮 Tæller -->
<h2 id="counter">0</h2>

<button onclick="add()">+1</button>

<!-- 🎲 Terning -->
<h2 id="dice">-</h2>

<button onclick="roll()"> Rul terning</button>

<!-- ⌨️ Input -->
<br><br>

<input type="text" oninput="updateText(this.value)" placeholder="Skriv noget...">

<p id="output"></p>

<!-- 🖼️ Billede -->
<br>

<img id="img" src="skærmbillede" alt="Mit billede">

<h2 id="om">Om mig</h2>

<p>Jeg er ved at lære at lave hjemmesider med HTML, CSS og JavaScript.</p>

<script>
function toggleDarkMode() {
document.body.classList.toggle("dark");
}

function skiftTekst() {
document.getElementById("tekst").innerText =
"Du klikkede på knappen! ";
}

let count = 0;

function add() {
count++;
document.getElementById("counter").innerText = count;
}

function roll() {
let result = Math.floor(Math.random() * 6) + 1;
document.getElementById("dice").innerText = result;
}

function updateText(value) {
document.getElementById("output").innerText = value;
}
</script>

</body>
</html>
